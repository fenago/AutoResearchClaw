<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResearchClaw — Autonomous Research Pipeline</title>
  <link rel="stylesheet" href="/static/src/styles/main.css" />
  <script src="/static/src/services/theme.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>ResearchClaw</h1>
      <span id="server-status" style="font-size:12px;color:var(--text-muted)"></span>
      <span id="connection-badge" class="status-badge idle">Connecting...</span>
      <div style="flex:1"></div>
      <span style="font-size:13px;color:var(--text-secondary)">Autonomous Research Pipeline</span>
      <select id="theme-select" title="Theme" style="padding:4px 6px;font-size:12px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:6px">
        <option value="system">🖥 System</option>
        <option value="dark">🌙 Dark</option>
        <option value="light">☀️ Light</option>
      </select>
      <button id="logout-btn" style="display:none;padding:4px 10px;font-size:12px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:6px;cursor:pointer">Sign out</button>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <h3>Overview</h3>
        <a class="nav-item active" data-view="newpaper" href="#">
          <span>✍️</span> New Paper
        </a>
        <a class="nav-item" data-view="dashboard" href="#">
          <span>📊</span> Dashboard
        </a>
        <a class="nav-item" data-view="pipeline" href="#">
          <span>🔬</span> Pipeline
        </a>
        <a class="nav-item" data-view="experiments" href="#">
          <span>📈</span> Experiments
        </a>
      </div>
      <div class="sidebar-section">
        <h3>Interact</h3>
        <a class="nav-item" data-view="chat" href="#">
          <span>💬</span> Chat
        </a>
        <a class="nav-item" data-view="paper" href="#">
          <span>📄</span> Paper
        </a>
      </div>
      <div class="sidebar-section">
        <h3>Manage</h3>
        <a class="nav-item" data-view="projects" href="#">
          <span>📁</span> Projects
        </a>
        <a class="nav-item" data-view="wizard" href="#">
          <span>🧙</span> Wizard
        </a>
        <a class="nav-item" data-view="llm" href="#">
          <span>⚙️</span> LLM Settings
        </a>
        <a class="nav-item" data-view="users" href="#">
          <span>👥</span> Users
        </a>
        <a class="nav-item" href="/site/quickstart.html" target="_blank" rel="noopener">
          <span>🚀</span> Quick Start
        </a>
        <a class="nav-item" href="/site/" target="_blank" rel="noopener">
          <span>🌐</span> Website
        </a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main" id="main-content">
      <p style="color:var(--text-muted)">Loading...</p>
    </main>
  </div>

  <!-- Scripts (no build step needed) -->
  <script src="/static/src/services/auth.js"></script>
  <script src="/static/src/services/api.js"></script>
  <script src="/static/src/services/websocket.js"></script>
  <script src="/static/src/components/NewPaper.js"></script>
  <script src="/static/src/components/Dashboard.js"></script>
  <script src="/static/src/components/PipelineView.js"></script>
  <script src="/static/src/components/ChatPanel.js"></script>
  <script src="/static/src/components/ExperimentMonitor.js"></script>
  <script src="/static/src/components/PaperPreview.js"></script>
  <script src="/static/src/components/ProjectList.js"></script>
  <script src="/static/src/components/WizardFlow.js"></script>
  <script src="/static/src/components/LLMSettings.js"></script>
  <script src="/static/src/components/UserAdmin.js"></script>
  <script src="/static/src/app.js"></script>
</body>
</html>
